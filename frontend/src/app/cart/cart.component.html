<div class="min-h-screen bg-gray-50 py-12 px-4">
  <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-6">
    <h2 class="text-3xl font-bold text-gray-800 mb-6">Shopping Cart</h2>

    <div *ngIf="cartItems.length === 0" class="text-center py-12">
      <img
        src="https://img.icons8.com/fluency/96/shopping-cart.png"
        alt="Empty Cart"
        class="mx-auto mb-4"
      />

      <p class="text-gray-500 text-lg">Your cart is empty.</p>
    </div>

    <div
      *ngFor="let item of cartItems"
      class="flex items-center justify-between py-5 border-b border-gray-200"
    >
      <div class="flex items-center gap-4">
        <img
          [src]="item.image"
          [alt]="item.name"
          class="w-20 h-20 rounded-lg object-cover border"
        />

        <div>
          <h3 class="text-lg font-semibold text-gray-800">
            {{ item.name }}
          </h3>

          <p class="text-gray-500">
            Quantity:
            <span class="font-medium">
              {{ item.quantity }}
            </span>
          </p>

          <p class="text-stone-500 font-bold mt-1">
            R{{ item.price * item.quantity }}
          </p>
        </div>
      </div>

      <button
        (click)="removeFromCart(item.id)"
        class="text-red-500 hover:text-red-700 transition"
      >
        <img
          width="24"
          height="24"
          src="https://img.icons8.com/material-rounded/24/1A1A1A/filled-trash.png"
          alt="Delete"
        />
      </button>
    </div>

    <div class="flex justify-between items-center mt-8">
      <h3 class="text-2xl font-bold text-gray-800">
        Total:
        <span class="text-stone-500"> R{{ totalAmount }} </span>
      </h3>

      <div class="flex gap-3">
        <button
          (click)="clearCart()"
          class="px-5 py-2 rounded-lg bg-gray-200 text-gray-700 hover:bg-gray-300 transition"
        >
          Clear Cart
        </button>

        <button
          (click)="goToCheckout()"
          [disabled]="cartItems.length === 0"
          class="px-5 py-2 rounded-lg bg-stone-700 text-white hover:bg-stone-900 disabled:bg-gray-300 disabled:cursor-not-allowed transition"
        >
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>
</div>
