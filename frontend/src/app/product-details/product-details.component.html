<div class="flex justify-center items-center p-4 md:p-6 bg-[#e0e0e0] min-h-screen">

  <div *ngIf="product" class="flex flex-col lg:flex-row items-center bg-white rounded-lg overflow-hidden text-center lg:text-left max-w-[1000px] w-full lg:w-[90%] p-[10px] xs:p-5 gap-5">

    <img
      *ngIf="product.image"
      [src]="product.image"
      alt="{{ product.name }}"
      class="w-full max-w-full xs:max-w-[80%] md:max-w-[90%] lg:max-w-[400px] h-auto rounded-md object-cover"
    />
    <img
      *ngIf="!product.image"
      src="https://via.placeholder.com/600x400"
      alt="No Image Available"
      class="w-full max-w-full xs:max-w-[80%] md:max-w-[90%] lg:max-w-[400px] h-auto rounded-md object-cover"
    />

    <div class="flex-1 p-[15px] lg:p-5">
      <h1 class="text-[1.3rem] xs:text-[1.5rem] md:text-[1.8rem] lg:text-[2rem] font-bold text-gray-800 mb-2">
        {{ product.name }}
      </h1>

      <button (click)="toggleDescription()" class="bg-[#FF8966] text-white border-none mr-2.5 px-6 py-3 text-base rounded-md transition-colors duration-300 cursor-pointer">
        {{ showDescription ? "Hide Description" : "Show Description" }}
      </button>

      <p *ngIf="showDescription" class="text-lg text-gray-600 mb-4 mt-4">
        {{ product.description || "No description available." }}
      </p>

      <!-- <p class="available-stock">IN STOCK: </p> -->
      <p class="text-[1.5rem] xs:text-[1.8rem] md:text-[2rem] lg:text-[2.5rem] font-semibold text-black mb-4">
        {{ product.price | currency : "R" }}
      </p>

      <button
        (click)="addToCart(product)"
        class="w-full md:w-auto bg-[#FF8966] hover:bg-[#aa563c] text-white border-none mr-2.5 mb-2 md:mb-0 p-2 xs:p-[10px] md:px-6 md:py-3 text-[0.9rem] xs:text-base rounded-md transition-colors duration-300 cursor-pointer"
      >
        Add to Cart
      </button>

      <button
        [routerLink]="['/cart']"
        class="w-full md:w-auto bg-white hover:bg-[#FF8966] hover:text-white text-[#FF8966] border-2 border-[#FF8966] p-2 xs:p-[10px] md:px-6 md:py-3 text-[0.9rem] xs:text-base rounded-md transition-colors duration-300 cursor-pointer"
      >
        Go to Cart
      </button>

      <!-- Reviews Section -->
      <div class="mt-5 p-5 border-t-2 border-[#ddd]">
        <div *ngFor="let review of reviews" class="border-b border-[#ddd] py-2.5">
          <p>
            <strong class="text-base">{{ review.username }}</strong> -
            <!-- <span class="stars">
              <ng-container *ngFor="let star of [1, 2, 3, 4, 5]; let i = index">
                <i
                  class="fa-solid"
                  [ngClass]="
                    review.rating >= i + 1 ? 'fa-star filled' : 'fa-star'
                  "
                ></i>
              </ng-container>
            </span> -->
          </p>
          <p>{{ review.comment }}</p>
          <p class="text-xs text-gray-500">{{ review.created_at | date }}</p>
        </div>

        <!-- Add Review -->
        <div class="mt-4">
          <h3 class="font-bold mb-2">Add a Review</h3>

          <!-- Clickable Star Rating -->
          <!-- <div class="star-rating">
            <i
              *ngFor="let star of [1, 2, 3, 4, 5]; let i = index"
              class="fa fa-star"
              [ngClass]="{ filled: newReview.rating >= i + 1 }"
              (click)="setRating(i + 1)"
            ></i>
          </div> -->

          <div class="flex mx-auto justify-between gap-3">
            <textarea
              [(ngModel)]="newReview.comment"
              placeholder="Write your review here..."
              class="max-w-[320px] min-w-[250px] max-h-[50px] border border-gray-300 rounded p-2"
            ></textarea>
            <button (click)="submitReview()" class="bg-[#FF8966] hover:bg-[#aa563c] text-white border-none px-6 py-3 text-base rounded-md transition-colors duration-300 cursor-pointer">
              Post Review
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!product" class="no-product">
    <p>Product not found.</p>
  </div>
</div>
